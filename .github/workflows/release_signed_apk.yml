name: Release Signed APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  release:
    name: Build & Release Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Build Release APK
        env:
          TERMUX_APP_VERSION_NAME: ${{ github.ref_name || inputs.tag }}
          TERMUX_APK_VERSION_TAG: ${{ github.ref_name || inputs.tag }}
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IWXTermux-release-signed-${{ github.ref_name || inputs.tag }}
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: IWXTermux ${{ github.ref_name || inputs.tag }}
          body: |
            ## IWXTermux ${{ github.ref_name || inputs.tag }}
            
            ### Download
            Pilih APK sesuai arsitektur device kamu:
            - `universal` → untuk semua device (ukuran lebih besar)
            - `arm64-v8a` → untuk device 64-bit modern
            - `armeabi-v7a` → untuk device 32-bit
            
            ### Changelog
            Release otomatis dari tag ${{ github.ref_name || inputs.tag }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
